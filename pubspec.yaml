name: greengears
description: A sustainable mobility app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.2.3
  lottie: ^3.3.0

  # File & Storage
  path_provider: ^2.1.5
  open_file: ^3.5.10
  file_picker: ^10.3.8
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

  # Networking & APIs
  http: ^1.2.0
  dio: ^5.9.1
  flutter_dotenv: ^6.0.0

  # Authentication
  flutter_appauth: ^7.0.1
  flutter_web_auth_2: ^4.1.0
  jwt_decode: ^0.3.1
  jwt_decoder: ^2.0.1

  # Utilities
  intl: ^0.20.2
  logger: ^2.6.2
  encrypt: ^5.0.3
  crypto: ^3.0.7
  collection: ^1.19.1

  # Excel Processing (Stable Version)
  excel: 3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/docs/CarPolicy.pdf
    - assets/docs/EMI_Calculator.xlsx
    - assets/anims/moving_car_lottie.json
    - assets/msal_config.json
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_regular.ttf
          style: normal

    - family: Code
      fonts:
        - asset: assets/fonts/GoogleSansCode_regular.ttf
          style: normal
