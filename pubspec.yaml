name: greengears
description: A sustainable mobility app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts (Inter, Google Sans Code)
  google_fonts: ^6.1.0

  # Material icons
  cupertino_icons: ^1.0.8

  # download functionality
  path_provider: ^2.1.5
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  file_picker: ^10.3.8
  permission_handler: ^12.0.1
#  testing
  flutter_appauth: ^7.0.1
  http: ^1.2.0
  jwt_decode: ^0.3.1
  shared_preferences: ^2.2.2

#  testing above


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/docs/CarPolicy.pdf
    - assets/docs/EMI_Calculator.xlsx
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_regular.ttf
          style: normal
    - family: Code
      fonts:
        - asset: assets/fonts/GoogleSansCode_regular.ttf
          style: normal

